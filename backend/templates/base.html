<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ title or "Admin" }}</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <h1>Building Access Admin</h1>
          <p>Manage flats, PINs, and access status.</p>
        </div>
        <div class="row">
          {% if request.session.get("is_admin") %}
          <form method="post" action="/admin-ui/logout">
            <button class="btn ghost" type="submit">Logout</button>
          </form>
          {% endif %}
        </div>
      </div>

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
